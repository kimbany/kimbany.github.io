<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0f1020" />
<title>운동 다마고치</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="device">
    <div id="screen">

      <!-- INTRO (이름 정하기) -->
      <section class="screen" data-screen="intro">
        <header class="bar"><div class="title">새 다마고치</div></header>
        <div class="stage">
          <canvas id="intro-canvas" width="128" height="128"></canvas>
          <div class="intro-bubble">
            안녕! 내 이름을 정해줘 🥚
          </div>
        </div>
        <div class="intro-form">
          <input
            id="intro-name-input"
            type="text"
            maxlength="8"
            placeholder="이름 입력 (최대 8자)"
            autocomplete="off"
            spellcheck="false"
          />
          <div id="intro-error" class="intro-error hidden"></div>
        </div>
        <div class="actions">
          <button class="btn primary" data-action="confirm-name">시작하기</button>
        </div>
      </section>

      <!-- HOME -->
      <section class="screen" data-screen="home">
        <header class="bar">
          <div class="lvl">LV <span id="home-level">1</span></div>
          <div class="exp-wrap">
            <div class="exp-bar"><div id="home-exp-fill" class="exp-fill"></div></div>
            <div class="exp-text"><span id="home-exp">0</span>/<span id="home-exp-max">100</span></div>
          </div>
        </header>

        <div class="stage">
          <div id="home-name" class="char-name">—</div>
          <canvas id="char-canvas" width="128" height="128"></canvas>
          <div id="mood-text" class="mood">행복</div>
          <div id="stage-text" class="stage-tier">아기</div>
        </div>

        <div class="hp-row">
          <span class="hp-label">HP</span>
          <div class="hp-bar" id="home-hp-bar"></div>
          <span class="hp-num"><span id="home-hp">10</span>/10</span>
        </div>

        <div class="ticket-row">
          <span class="ticket-icon">🎟</span>
          <div class="ticket-bar"><div id="home-ticket-fill" class="ticket-fill"></div></div>
          <span class="ticket-num">
            <span id="home-ticket-progress">0/30</span>분 ·
            <span id="home-tickets">0</span>장
          </span>
        </div>

        <div class="actions">
          <button class="btn primary" data-action="goto-workout">운동 시작</button>
          <button class="btn" data-action="goto-inventory">인벤토리</button>
        </div>
      </section>

      <!-- WORKOUT -->
      <section class="screen" data-screen="workout">
        <header class="bar"><div class="title">운동 중</div></header>
        <div class="stage">
          <canvas id="workout-canvas" width="128" height="128"></canvas>
        </div>
        <div class="timer" id="timer">00:00</div>
        <div id="boost-tag" class="boost-tag hidden">EXP x2 적용 중</div>
        <div class="actions">
          <button class="btn danger" data-action="end-workout">운동 종료</button>
          <button class="btn ghost" data-action="cancel-workout">취소</button>
        </div>
      </section>

      <!-- RESULT -->
      <section class="screen" data-screen="result">
        <header class="bar"><div class="title">결과</div></header>
        <div class="result-card">
          <div class="line"><span>시간</span><span id="r-time">00:00</span></div>

          <!-- INPUT phase: shown right after workout ends -->
          <div id="r-input-section">
            <div class="input-hint">
              ⌚ Apple Watch / 건강 앱 데이터<br/>
              <span class="dim">입력하면 EXP 보너스 (선택)</span>
            </div>
            <div class="input-row">
              <label>평균 심박</label>
              <input id="r-input-hr" type="number" inputmode="numeric" min="40" max="220" placeholder="bpm" />
            </div>
            <div class="input-row">
              <label>칼로리</label>
              <input id="r-input-cal" type="number" inputmode="numeric" min="0" max="2000" placeholder="kcal" />
            </div>
            <div class="actions inline">
              <button class="btn primary" data-action="confirm-result">확인</button>
              <button class="btn ghost" data-action="skip-result">건너뛰기</button>
            </div>
          </div>

          <!-- REWARD phase: shown after user confirms inputs -->
          <div id="r-reward-section" class="hidden">
            <div class="line hidden" id="r-hr-line"><span>평균 심박</span><span id="r-hr">—</span></div>
            <div class="line hidden" id="r-cal-line"><span>칼로리</span><span id="r-cal">—</span></div>
            <div class="line hidden" id="r-int-line"><span>강도</span><span id="r-int">—</span></div>
            <div class="line"><span>EXP</span><span id="r-exp">+0</span></div>
            <div class="line"><span>HP</span><span id="r-hp">+0</span></div>
            <div class="line ticket-line hidden" id="r-ticket-line"><span>🎟 쿠폰</span><span id="r-tickets">+0</span></div>
            <div class="line lvlup hidden" id="r-lvlup-line"><span>레벨 업!</span><span id="r-lvlup">LV 2</span></div>
            <div class="reward">
              <div class="reward-label">보상</div>
              <div class="reward-box" id="r-reward">—</div>
            </div>
          </div>
        </div>
        <div class="actions" id="r-final-actions" style="display:none;">
          <button class="btn primary" data-action="goto-home">확인</button>
        </div>
      </section>

      <!-- INVENTORY -->
      <section class="screen" data-screen="inventory">
        <header class="bar"><div class="title">인벤토리</div></header>
        <ul id="inv-list" class="inv-list"></ul>
        <div class="actions">
          <button class="btn" data-action="goto-home">뒤로</button>
        </div>
      </section>

      <!-- TOAST -->
      <div id="toast" class="toast hidden"></div>
    </div>
  </div>

  <script src="js/logic.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/health.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

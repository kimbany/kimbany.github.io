<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASMR 사운드 플레이어</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --border: #2a313a;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #7aa2f7;
    --accent2: #bb9af7;
    --danger: #f7768e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Noto Sans KR", sans-serif;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { color: var(--muted); margin-bottom: 24px; font-size: 14px; }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 16px;
  }
  .card h2 { margin: 0 0 12px; font-size: 15px; color: var(--muted); font-weight: 500; }

  .sounds { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .sound {
    background: #1c232c; border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; cursor: pointer; user-select: none; transition: all .15s;
  }
  .sound:hover { border-color: #3a4452; }
  .sound.active { border-color: var(--accent); background: #1d2638; }
  .sound .name { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: flex;
    justify-content: space-between; align-items: center; }
  .sound .icon { font-size: 18px; }
  .sound input[type=range] { width: 100%; margin-top: 6px; }
  .sound .vol { font-size: 11px; color: var(--muted); }
  .sound.active .vol { color: var(--accent); }

  .duration-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .chip {
    background: #1c232c; border: 1px solid var(--border); color: var(--text);
    padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px;
  }
  .chip.active { background: var(--accent); color: #0e1116; border-color: var(--accent); }
  .custom-time { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .custom-time input {
    background: #1c232c; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 10px; width: 70px; font-size: 14px;
  }
  .custom-time label { color: var(--muted); font-size: 13px; }

  .controls { display: flex; gap: 10px; align-items: center; }
  button.play {
    flex: 1; background: var(--accent); color: #0e1116; border: 0;
    padding: 14px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  button.play.playing { background: var(--danger); color: #fff; }
  button.play:disabled { opacity: .5; cursor: not-allowed; }
  .timer { font-variant-numeric: tabular-nums; font-size: 22px; font-weight: 700;
    min-width: 100px; text-align: right; }
  .master {
    display: flex; align-items: center; gap: 12px; margin-top: 12px;
  }
  .master label { font-size: 13px; color: var(--muted); min-width: 60px; }
  .master input[type=range] { flex: 1; }

  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
  a { color: var(--accent); }
  input[type=range] { accent-color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎧 ASMR 사운드 플레이어</h1>
  <p class="sub">소리를 골라 섞고, 원하는 시간만큼 재생하세요. 모든 소리는 브라우저에서 실시간으로 합성됩니다.</p>

  <div class="card">
    <h2>1. 소리 선택 (여러 개 선택 가능)</h2>
    <div class="sounds" id="sounds"></div>
  </div>

  <div class="card">
    <h2>2. 재생 시간</h2>
    <div class="duration-row" id="presets"></div>
    <div class="custom-time">
      <label>직접 입력</label>
      <input type="number" id="customH" min="0" max="24" value="0"> <label>시간</label>
      <input type="number" id="customM" min="0" max="59" value="30"> <label>분</label>
      <button class="chip" id="applyCustom">적용</button>
    </div>
    <div class="hint">재생 시간이 0이면 멈출 때까지 무한 반복됩니다.</div>
  </div>

  <div class="card">
    <h2>3. 재생</h2>
    <div class="controls">
      <button class="play" id="playBtn">재생</button>
      <div class="timer" id="timer">--:--:--</div>
    </div>
    <div class="master">
      <label>전체 볼륨</label>
      <input type="range" id="master" min="0" max="100" value="70">
      <span id="masterVal" class="vol">70%</span>
    </div>
    <div class="hint">📱 모바일은 화면을 켠 채로 두어야 계속 재생됩니다.</div>
  </div>

  <p class="sub"><a href="../">← 메인으로</a></p>
</div>

<script>
const SOUNDS = [
  { id: 'white',  name: '화이트 노이즈', icon: '⬜' },
  { id: 'pink',   name: '핑크 노이즈',   icon: '🌸' },
  { id: 'brown',  name: '브라운 노이즈', icon: '🟫' },
  { id: 'rain',   name: '빗소리',        icon: '🌧️' },
  { id: 'ocean',  name: '파도',          icon: '🌊' },
  { id: 'wind',   name: '바람',          icon: '💨' },
  { id: 'fire',   name: '모닥불',        icon: '🔥' },
  { id: 'stream', name: '시냇물',        icon: '💧' },
  { id: 'fan',    name: '선풍기',        icon: '🌀' },
];

const PRESETS = [
  { label: '15분',  sec: 15 * 60 },
  { label: '30분',  sec: 30 * 60 },
  { label: '1시간', sec: 60 * 60 },
  { label: '2시간', sec: 120 * 60 },
  { label: '3시간', sec: 180 * 60 },
  { label: '8시간', sec: 480 * 60 },
  { label: '∞ 무한',sec: 0 },
];

let ctx = null;
let masterGain = null;
const active = new Map(); // id -> { gain, stop, volume }
let durationSec = 60 * 60;
let endTime = 0;
let tickHandle = null;
let isPlaying = false;

// ---------- Noise generators ----------
function createWhiteNoise() {
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buffer; src.loop = true;
  return src;
}

function createPinkNoise() {
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
  for (let i = 0; i < bufferSize; i++) {
    const w = Math.random() * 2 - 1;
    b0 = 0.99886 * b0 + w * 0.0555179;
    b1 = 0.99332 * b1 + w * 0.0750759;
    b2 = 0.96900 * b2 + w * 0.1538520;
    b3 = 0.86650 * b3 + w * 0.3104856;
    b4 = 0.55000 * b4 + w * 0.5329522;
    b5 = -0.7616 * b5 - w * 0.0168980;
    data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
    b6 = w * 0.115926;
  }
  const src = ctx.createBufferSource();
  src.buffer = buffer; src.loop = true;
  return src;
}

function createBrownNoise() {
  const bufferSize = 2 * ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  let last = 0;
  for (let i = 0; i < bufferSize; i++) {
    const w = Math.random() * 2 - 1;
    last = (last + 0.02 * w) / 1.02;
    data[i] = last * 3.5;
  }
  const src = ctx.createBufferSource();
  src.buffer = buffer; src.loop = true;
  return src;
}

// ---------- Sound builders ----------
// Each builder returns { node (output), stop() }
function buildWhite() {
  const src = createWhiteNoise();
  const g = ctx.createGain(); g.gain.value = 0.4;
  src.connect(g); src.start();
  return { node: g, stop: () => { try { src.stop(); } catch(e){} } };
}

function buildPink() {
  const src = createPinkNoise();
  const g = ctx.createGain(); g.gain.value = 0.7;
  src.connect(g); src.start();
  return { node: g, stop: () => { try { src.stop(); } catch(e){} } };
}

function buildBrown() {
  const src = createBrownNoise();
  const g = ctx.createGain(); g.gain.value = 0.9;
  src.connect(g); src.start();
  return { node: g, stop: () => { try { src.stop(); } catch(e){} } };
}

function buildRain() {
  // Filtered white noise + occasional droplets
  const src = createWhiteNoise();
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 400;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';  lp.frequency.value = 6000;
  const g = ctx.createGain(); g.gain.value = 0.5;
  src.connect(hp); hp.connect(lp); lp.connect(g);
  src.start();

  // droplets
  const dropletInterval = setInterval(() => {
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    osc.frequency.value = 800 + Math.random() * 1500;
    og.gain.setValueAtTime(0, ctx.currentTime);
    og.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.005);
    og.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.06);
    osc.connect(og); og.connect(g);
    osc.start();
    osc.stop(ctx.currentTime + 0.07);
  }, 120);

  return {
    node: g,
    stop: () => { clearInterval(dropletInterval); try { src.stop(); } catch(e){} }
  };
}

function buildOcean() {
  const src = createBrownNoise();
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1200;
  const g = ctx.createGain(); g.gain.value = 0.6;
  src.connect(lp); lp.connect(g);

  // Slow LFO for wave swell
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.12;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.4;
  lfo.connect(lfoGain); lfoGain.connect(g.gain);
  src.start(); lfo.start();
  return {
    node: g,
    stop: () => { try { src.stop(); lfo.stop(); } catch(e){} }
  };
}

function buildWind() {
  const src = createPinkNoise();
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 500; bp.Q.value = 0.6;
  const g = ctx.createGain(); g.gain.value = 0.7;
  src.connect(bp); bp.connect(g);

  // Modulate filter freq for gusts
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.15;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 300;
  lfo.connect(lfoGain); lfoGain.connect(bp.frequency);
  src.start(); lfo.start();
  return {
    node: g,
    stop: () => { try { src.stop(); lfo.stop(); } catch(e){} }
  };
}

function buildFire() {
  const src = createWhiteNoise();
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1800;
  const g = ctx.createGain(); g.gain.value = 0.25;
  src.connect(lp); lp.connect(g);
  src.start();

  // crackles
  const crackleInterval = setInterval(() => {
    if (!ctx) return;
    const osc = ctx.createOscillator(); osc.type = 'square';
    const og = ctx.createGain();
    osc.frequency.value = 100 + Math.random() * 400;
    og.gain.setValueAtTime(0, ctx.currentTime);
    og.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.002);
    og.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.04);
    osc.connect(og); og.connect(g);
    osc.start();
    osc.stop(ctx.currentTime + 0.05);
  }, 180);

  return {
    node: g,
    stop: () => { clearInterval(crackleInterval); try { src.stop(); } catch(e){} }
  };
}

function buildStream() {
  const src = createWhiteNoise();
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1500;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';  lp.frequency.value = 5000;
  const g = ctx.createGain(); g.gain.value = 0.35;
  src.connect(hp); hp.connect(lp); lp.connect(g);

  // bubbling
  const lfo = ctx.createOscillator(); lfo.frequency.value = 3.2;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 800;
  lfo.connect(lfoGain); lfoGain.connect(lp.frequency);
  src.start(); lfo.start();
  return {
    node: g,
    stop: () => { try { src.stop(); lfo.stop(); } catch(e){} }
  };
}

function buildFan() {
  const src = createBrownNoise();
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 800;
  const g = ctx.createGain(); g.gain.value = 0.7;
  src.connect(lp); lp.connect(g);

  // hum
  const osc = ctx.createOscillator(); osc.frequency.value = 60; osc.type = 'sine';
  const og = ctx.createGain(); og.gain.value = 0.05;
  osc.connect(og); og.connect(g);
  src.start(); osc.start();
  return {
    node: g,
    stop: () => { try { src.stop(); osc.stop(); } catch(e){} }
  };
}

const BUILDERS = {
  white: buildWhite, pink: buildPink, brown: buildBrown,
  rain: buildRain, ocean: buildOcean, wind: buildWind,
  fire: buildFire, stream: buildStream, fan: buildFan,
};

// ---------- UI ----------
const soundsEl = document.getElementById('sounds');
const presetsEl = document.getElementById('presets');
const playBtn = document.getElementById('playBtn');
const timerEl = document.getElementById('timer');
const masterEl = document.getElementById('master');
const masterValEl = document.getElementById('masterVal');
const customH = document.getElementById('customH');
const customM = document.getElementById('customM');
const applyCustom = document.getElementById('applyCustom');

const soundState = {}; // id -> { selected: bool, volume: 0..1 }

SOUNDS.forEach(s => {
  soundState[s.id] = { selected: false, volume: 0.6 };
  const el = document.createElement('div');
  el.className = 'sound';
  el.dataset.id = s.id;
  el.innerHTML = `
    <div class="name"><span>${s.name}</span><span class="icon">${s.icon}</span></div>
    <input type="range" min="0" max="100" value="60" data-vol>
    <div class="vol"><span data-volval>60</span>%</div>
  `;
  const range = el.querySelector('[data-vol]');
  const volval = el.querySelector('[data-volval]');

  el.addEventListener('click', (e) => {
    if (e.target === range) return;
    const st = soundState[s.id];
    st.selected = !st.selected;
    el.classList.toggle('active', st.selected);
    if (isPlaying) {
      if (st.selected) startSound(s.id);
      else stopSound(s.id);
    }
  });

  range.addEventListener('input', () => {
    const v = parseInt(range.value, 10) / 100;
    soundState[s.id].volume = v;
    volval.textContent = range.value;
    const a = active.get(s.id);
    if (a) a.gain.gain.value = v;
  });
  range.addEventListener('click', e => e.stopPropagation());

  soundsEl.appendChild(el);
});

PRESETS.forEach((p, i) => {
  const c = document.createElement('div');
  c.className = 'chip' + (p.sec === durationSec ? ' active' : '');
  c.textContent = p.label;
  c.addEventListener('click', () => {
    durationSec = p.sec;
    [...presetsEl.children].forEach(x => x.classList.remove('active'));
    c.classList.add('active');
  });
  presetsEl.appendChild(c);
});

applyCustom.addEventListener('click', () => {
  const h = parseInt(customH.value, 10) || 0;
  const m = parseInt(customM.value, 10) || 0;
  durationSec = h * 3600 + m * 60;
  [...presetsEl.children].forEach(x => x.classList.remove('active'));
});

masterEl.addEventListener('input', () => {
  const v = parseInt(masterEl.value, 10) / 100;
  masterValEl.textContent = masterEl.value + '%';
  if (masterGain) masterGain.gain.value = v;
});

playBtn.addEventListener('click', () => {
  if (isPlaying) stopAll();
  else playAll();
});

// ---------- Play / Stop ----------
function ensureCtx() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = parseInt(masterEl.value, 10) / 100;
    masterGain.connect(ctx.destination);
  }
  if (ctx.state === 'suspended') ctx.resume();
}

function startSound(id) {
  if (active.has(id)) return;
  ensureCtx();
  const built = BUILDERS[id]();
  const g = ctx.createGain();
  g.gain.value = soundState[id].volume;
  built.node.connect(g);
  g.connect(masterGain);
  // fade in
  const v = soundState[id].volume;
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(v, ctx.currentTime + 0.4);
  active.set(id, { gain: g, stop: built.stop });
}

function stopSound(id) {
  const a = active.get(id);
  if (!a) return;
  const now = ctx.currentTime;
  a.gain.gain.cancelScheduledValues(now);
  a.gain.gain.setValueAtTime(a.gain.gain.value, now);
  a.gain.gain.linearRampToValueAtTime(0, now + 0.3);
  setTimeout(() => { a.stop(); try { a.gain.disconnect(); } catch(e){} }, 350);
  active.delete(id);
}

function playAll() {
  const selected = SOUNDS.filter(s => soundState[s.id].selected).map(s => s.id);
  if (selected.length === 0) {
    alert('소리를 하나 이상 선택해주세요.');
    return;
  }
  ensureCtx();
  selected.forEach(startSound);
  isPlaying = true;
  playBtn.classList.add('playing');
  playBtn.textContent = '정지';

  if (durationSec > 0) {
    endTime = Date.now() + durationSec * 1000;
  } else {
    endTime = 0;
  }
  updateTimer();
  tickHandle = setInterval(updateTimer, 250);
}

function stopAll() {
  [...active.keys()].forEach(stopSound);
  isPlaying = false;
  playBtn.classList.remove('playing');
  playBtn.textContent = '재생';
  if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
  timerEl.textContent = '--:--:--';
}

function updateTimer() {
  if (!isPlaying) return;
  if (endTime === 0) {
    const elapsed = Math.floor((Date.now() - (window._startTime || (window._startTime = Date.now()))) / 1000);
    timerEl.textContent = '∞ ' + fmt(elapsed);
    return;
  }
  const remain = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
  timerEl.textContent = fmt(remain);
  if (remain <= 0) {
    stopAll();
  }
}

function fmt(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// reset start time for infinite mode each play
const _origPlayAll = playAll;
window._startTime = null;
playBtn.addEventListener('click', () => {
  if (!isPlaying) window._startTime = Date.now();
});
</script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D 입체 사다리 게임</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
    font-family: -apple-system, "Segoe UI", "Noto Sans KR", sans-serif; }
  #canvas-wrap { position:fixed; inset:0;
    background: linear-gradient(180deg, #8ad6ff 0%, #c4ebff 60%, #ffe7f3 100%); }

  #ui {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    background: rgba(255,255,255,0.94); padding: 14px 16px; border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    width: 280px; max-height: calc(100vh - 32px); overflow-y: auto;
  }
  #ui h2 { margin: 0 0 10px 0; font-size: 18px; color: #ff3b8b; }
  .step-title { font-size: 13px; color: #888; margin-bottom: 6px; }
  .row { display:flex; align-items:center; gap:8px; margin: 6px 0; font-size: 14px; }
  .row input[type=number] { width: 70px; padding: 5px 6px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  button {
    padding: 8px 14px; margin: 4px 4px 0 0; border: none; border-radius: 10px;
    background: #ff3b8b; color: #fff; font-weight: 700; cursor: pointer; font-size: 14px;
    box-shadow: 0 3px 0 #c22c6d;
    transition: transform .08s;
  }
  button:hover { background: #ff589c; }
  button:active { transform: translateY(2px); box-shadow: 0 1px 0 #c22c6d; }
  button.secondary { background:#4da7ff; box-shadow: 0 3px 0 #2f7ecf; }
  button.secondary:hover { background:#6bb6ff; }
  button:disabled { background:#ccc; box-shadow: 0 3px 0 #aaa; cursor: not-allowed; }
  button.ghost { background:transparent; color:#666; box-shadow:none; border:1px solid #ccc; }
  button.ghost:hover { background:#f2f2f2; }

  #labelInputs { margin: 6px 0; display: grid; grid-template-columns: 1fr; gap: 4px; }
  .labelRow { display:flex; align-items:center; gap:6px; font-size: 13px; }
  .labelRow .num {
    width:22px; height:22px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-size:12px; flex-shrink:0;
  }
  .labelRow input { flex:1; padding:4px 6px; border:1px solid #ddd; border-radius:6px; font-size:13px; min-width:0; }

  #result { margin-top: 10px; font-weight: 700; color: #333; min-height: 20px; font-size: 14px; }
  #hint { margin-top: 8px; font-size: 12px; color: #666; }
  #legend { position: absolute; bottom: 12px; right: 12px; z-index: 10;
    background: rgba(255,255,255,0.85); padding: 8px 12px; border-radius: 10px; font-size: 12px; color:#555; }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="ui">
  <h2>🎡 3D 입체 사다리</h2>

  <!-- Step 1: Player count -->
  <div id="step1">
    <div class="step-title">1단계 — 플레이어 수를 선택하세요</div>
    <div class="row">
      <input type="number" id="playerCount" value="5" min="2" max="15">
      <span>명 (2~15)</span>
    </div>
    <button id="toStep2">다음 →</button>
  </div>

  <!-- Step 2: Bottom labels -->
  <div id="step2" style="display:none;">
    <div class="step-title">2단계 — 각 자리의 결과를 적어주세요</div>
    <div id="labelInputs"></div>
    <button id="back" class="ghost">← 뒤로</button>
    <button id="play">▶ 출발!</button>
  </div>

  <div id="result"></div>

  <!-- Post-play -->
  <div id="post" style="display:none; margin-top:8px;">
    <button id="again" class="secondary">🔀 다시</button>
    <button id="reset" class="ghost">처음으로</button>
  </div>

  <div id="hint">드래그로 회전, 휠로 확대/축소</div>
</div>

<div id="legend">첫 기둥과 마지막 기둥이 원통처럼 이어져 있어요</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- State ----------
let N = 5;
let R = 3;          // cylinder radius (depends on N)
const H = 9;        // cylinder height

const COLORS = [
  0x58c24d, 0xf9d84a, 0xff6b88, 0x8a67ff, 0x2db6ff,
  0xff9a4d, 0x3ad1c6, 0xff69b4, 0x9ccc65, 0xffab91,
  0x7e57c2, 0x26c6da, 0xffc107, 0xef5350, 0x42a5f5
];

let bottomLabels = [];   // user-entered strings for each column
let rungs = [];          // { col, y } - connects col <-> (col+1)%N
let rungMeshes = [];     // corresponding mesh references
let labelSprites = [];   // bottom label sprites (for live update)

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xc4ebff, 20, 45);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 2.5, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0, 0);

// ---------- Lights ----------
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const key = new THREE.DirectionalLight(0xffffff, 0.9);
key.position.set(6, 12, 6);
scene.add(key);
const rim = new THREE.DirectionalLight(0xffd0e8, 0.35);
rim.position.set(-6, 4, -6);
scene.add(rim);

// ---------- Floor ----------
const floor = (() => {
  const geo = new THREE.CircleGeometry(1, 64);
  const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI / 2;
  m.position.y = -H/2 - 0.2;
  scene.add(m);
  return m;
})();

const ladderGroup = new THREE.Group();
scene.add(ladderGroup);

// ladderContent holds columns + rungs + labels (cleared on rebuild)
// player is a sibling that stays through rebuilds — both rotate with ladderGroup
const ladderContent = new THREE.Group();
ladderGroup.add(ladderContent);

// ---------- Helpers ----------
function angleOf(i) { return (i / N) * Math.PI * 2; }
function columnPos(i, y) {
  const a = angleOf(i);
  return new THREE.Vector3(R * Math.cos(a), y, R * Math.sin(a));
}
function computeR(n) { return Math.max(2.8, 2 + n * 0.35); }

function makeLabelSprite(text, color = '#ffffff', bg = null, size = 1.2) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (bg) {
    const pad = 16;
    ctx.fillStyle = bg;
    roundRect(ctx, pad, 40, canvas.width - pad*2, 176, 40);
    ctx.fill();
  }
  const maxW = canvas.width - 40;
  let fontSize = 110;
  ctx.font = `bold ${fontSize}px -apple-system, "Segoe UI", "Noto Sans KR", sans-serif`;
  while (ctx.measureText(text).width > maxW && fontSize > 30) {
    fontSize -= 6;
    ctx.font = `bold ${fontSize}px -apple-system, "Segoe UI", "Noto Sans KR", sans-serif`;
  }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#ffffff';
  ctx.strokeText(text, canvas.width/2, canvas.height/2);
  ctx.fillStyle = color;
  ctx.fillText(text, canvas.width/2, canvas.height/2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = 4;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(size * 2, size, 1);
  sp.renderOrder = 5;
  return sp;
}

function makeNumberSprite(text, size = 0.7) {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 170px -apple-system, "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 10;
  ctx.strokeStyle = '#ffffff';
  ctx.strokeText(text, 128, 138);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, 128, 138);
  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = 4;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(size, size, size);
  sp.renderOrder = 5;
  return sp;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function updateBottomLabel(i) {
  const text = bottomLabels[i] && bottomLabels[i].trim() ? bottomLabels[i] : `${i+1}`;
  const color = '#' + (COLORS[i % COLORS.length]).toString(16).padStart(6, '0');
  const newSp = makeLabelSprite(text, color, '#ffffff', 0.95);
  newSp.position.copy(columnPos(i, -H/2 - 0.75));
  const old = labelSprites[i];
  if (old) {
    ladderContent.remove(old);
    old.material.map.dispose();
    old.material.dispose();
  }
  ladderContent.add(newSp);
  labelSprites[i] = newSp;
}

function clearGroup(g) {
  while (g.children.length) {
    const c = g.children[0];
    g.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material) {
      if (c.material.map) c.material.map.dispose();
      c.material.dispose();
    }
  }
}

// ---------- Build cylinder (columns only, no rungs) ----------
function buildCylinder() {
  clearGroup(ladderContent);
  labelSprites = [];
  rungMeshes = [];
  rungs = [];
  ladderGroup.rotation.y = 0;

  R = computeR(N);
  floor.scale.set(R + 4, R + 4, 1);
  camera.position.set(0, 2.5, R + 8.5);
  controls.minDistance = R + 2;
  controls.maxDistance = R + 20;
  controls.update();

  const poleMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.05 });
  for (let i = 0; i < N; i++) {
    const geo = new THREE.CylinderGeometry(0.06, 0.06, H, 12);
    const pole = new THREE.Mesh(geo, poleMat);
    pole.position.copy(columnPos(i, 0));
    ladderContent.add(pole);

    const col = COLORS[i % COLORS.length];
    const ballGeo = new THREE.SphereGeometry(0.42, 32, 32);
    const ballMat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.3 });
    const ball = new THREE.Mesh(ballGeo, ballMat);
    const topPos = columnPos(i, H/2 + 0.05);
    ball.position.copy(topPos);
    ladderContent.add(ball);

    const numSprite = makeNumberSprite(String(i + 1), 0.7);
    numSprite.position.copy(topPos);
    ladderContent.add(numSprite);

    updateBottomLabel(i);
  }
}

// ---------- Rung generation ----------
function generateRungs() {
  rungs = [];
  const touchCount = new Array(N).fill(0);
  const used = new Set();
  const minY = -H/2 + 0.9, maxY = H/2 - 0.9;
  const bucketSize = 0.42;
  function bucketOf(y) { return Math.round(y / bucketSize); }

  function tryPlace(col, y) {
    const b = bucketOf(y);
    const keyL = `${col}:${b}`;
    const keyR = `${(col + 1) % N}:${b}`;
    if (used.has(keyL) || used.has(keyR)) return false;
    used.add(keyL); used.add(keyR);
    rungs.push({ col, y });
    touchCount[col]++;
    touchCount[(col + 1) % N]++;
    return true;
  }

  const target = Math.floor(N * 1.6) + 3 + Math.floor(Math.random() * N);

  let tries = 0;
  while (rungs.length < target && tries < target * 80) {
    tries++;
    const c = Math.floor(Math.random() * N);
    const y = minY + Math.random() * (maxY - minY);
    tryPlace(c, y);
  }

  // Guarantee every column is touched by at least one rung
  for (let c = 0; c < N; c++) {
    if (touchCount[c] > 0) continue;
    for (let attempt = 0; attempt < 300; attempt++) {
      const side = Math.random() < 0.5 ? c : (c - 1 + N) % N;
      const y = minY + Math.random() * (maxY - minY);
      if (tryPlace(side, y)) break;
    }
  }
}

// ---------- Rung meshes (hidden initially) ----------
function buildRungMeshes() {
  const rungMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
  rungMeshes = [];
  for (const r of rungs) {
    const a1 = angleOf(r.col);
    const a2 = angleOf(r.col + 1);
    const pts = [];
    const steps = 24;
    for (let k = 0; k <= steps; k++) {
      const t = k / steps;
      const a = a1 + (a2 - a1) * t;
      pts.push(new THREE.Vector3(R * Math.cos(a), r.y, R * Math.sin(a)));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.06, 10, false);
    const tube = new THREE.Mesh(tubeGeo, rungMat);
    tube.visible = false;
    tubeGeo.setDrawRange(0, 0);
    ladderContent.add(tube);
    rungMeshes.push(tube);
  }
}

function animateRungsReveal() {
  return new Promise(resolve => {
    const total = rungMeshes.length;
    if (total === 0) { resolve(); return; }
    // sort top to bottom for a pleasant reveal order
    const order = rungMeshes
      .map((m, i) => ({ m, y: rungs[i].y }))
      .sort((a, b) => b.y - a.y)
      .map(o => o.m);

    let completed = 0;
    const stagger = Math.min(100, 1200 / total);
    const duration = 350;

    order.forEach((mesh, i) => {
      mesh.visible = true;
      const indexCount = mesh.geometry.index.count;
      setTimeout(() => {
        const start = performance.now();
        function step(now) {
          const t = Math.min(1, (now - start) / duration);
          mesh.geometry.setDrawRange(0, Math.floor(indexCount * t));
          if (t < 1) requestAnimationFrame(step);
          else {
            completed++;
            if (completed === total) resolve();
          }
        }
        requestAnimationFrame(step);
      }, i * stagger);
    });
  });
}

// ---------- Player ----------
const player = new THREE.Group();
const playerBall = new THREE.Mesh(
  new THREE.SphereGeometry(0.3, 32, 32),
  new THREE.MeshStandardMaterial({ color: 0xff1f77, emissive: 0x661033, emissiveIntensity: 0.4, roughness: 0.25 })
);
player.add(playerBall);
const playerGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.5, 24, 24),
  new THREE.MeshBasicMaterial({ color: 0xff8ac2, transparent: true, opacity: 0.35 })
);
player.add(playerGlow);
player.visible = false;
ladderGroup.add(player);

// ---------- Traversal ----------
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function animateDown(col, y1, y2, speed = 4.5) {
  return new Promise(resolve => {
    const duration = Math.max(80, Math.abs(y1 - y2) / speed * 1000);
    const start = performance.now();
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const y = y1 + (y2 - y1) * t;
      player.position.copy(columnPos(col, y));
      if (t < 1) requestAnimationFrame(step); else resolve();
    }
    requestAnimationFrame(step);
  });
}

function animateArc(colA, colB, y, duration = 360) {
  return new Promise(resolve => {
    const a1 = angleOf(colA);
    let a2 = angleOf(colB);
    let delta = a2 - a1;
    if (delta > Math.PI) delta -= Math.PI * 2;
    if (delta < -Math.PI) delta += Math.PI * 2;
    const start = performance.now();
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const a = a1 + delta * t;
      player.position.set(R * Math.cos(a), y, R * Math.sin(a));
      if (t < 1) requestAnimationFrame(step); else resolve();
    }
    requestAnimationFrame(step);
  });
}

async function traverse(startCol) {
  player.visible = true;
  let col = startCol;
  let y = H / 2;
  player.position.copy(columnPos(col, y));

  const sorted = [...rungs].sort((a, b) => b.y - a.y);

  for (let safety = 0; safety < 500; safety++) {
    let next = null;
    for (const r of sorted) {
      if (r.y >= y - 1e-6) continue;
      if (r.col === col || (r.col + 1) % N === col) { next = r; break; }
    }
    const targetY = next ? next.y : -H / 2;
    await animateDown(col, y, targetY);
    y = targetY;
    if (!next) break;
    const newCol = (next.col === col) ? (col + 1) % N : (col - 1 + N) % N;
    await animateArc(col, newCol, y);
    col = newCol;
  }

  const label = bottomLabels[col] && bottomLabels[col].trim() ? bottomLabels[col] : `${col+1}`;
  document.getElementById('result').innerHTML =
    `🎉 <b>${startCol + 1}번</b> → <span style="color:#ff3b8b">${escapeHtml(label)}</span>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- UI wiring ----------
const step1El = document.getElementById('step1');
const step2El = document.getElementById('step2');
const postEl = document.getElementById('post');
const resultEl = document.getElementById('result');
const labelInputsEl = document.getElementById('labelInputs');

let running = false;

function renderLabelInputs() {
  labelInputsEl.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const row = document.createElement('div');
    row.className = 'labelRow';
    const numDot = document.createElement('span');
    numDot.className = 'num';
    numDot.style.background = '#' + COLORS[i % COLORS.length].toString(16).padStart(6, '0');
    numDot.textContent = String(i + 1);
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = i === 0 ? '예) 당첨' : (i === 1 ? '예) 꽝' : '');
    input.value = bottomLabels[i] || '';
    input.maxLength = 20;
    input.addEventListener('input', () => {
      bottomLabels[i] = input.value;
      updateBottomLabel(i);
    });
    row.appendChild(numDot);
    row.appendChild(input);
    labelInputsEl.appendChild(row);
  }
}

function goToStep1() {
  step1El.style.display = '';
  step2El.style.display = 'none';
  postEl.style.display = 'none';
  resultEl.textContent = '';
  player.visible = false;
  clearGroup(ladderContent);
  ladderGroup.rotation.y = 0;
}

function goToStep2() {
  const inputN = parseInt(document.getElementById('playerCount').value);
  N = Math.max(2, Math.min(15, isNaN(inputN) ? 5 : inputN));
  document.getElementById('playerCount').value = N;
  bottomLabels = new Array(N).fill('').map((_, i) => bottomLabels[i] || '');
  bottomLabels.length = N;

  step1El.style.display = 'none';
  step2El.style.display = '';
  postEl.style.display = 'none';
  resultEl.textContent = '';
  player.visible = false;

  buildCylinder();
  renderLabelInputs();
}

document.getElementById('toStep2').addEventListener('click', goToStep2);
document.getElementById('back').addEventListener('click', goToStep1);

document.getElementById('play').addEventListener('click', async () => {
  if (running) return;
  running = true;
  document.getElementById('play').disabled = true;
  document.getElementById('back').disabled = true;

  // remove any previous rung meshes (clean re-play)
  for (const m of rungMeshes) {
    ladderContent.remove(m);
    m.geometry.dispose();
  }
  rungMeshes = [];

  resultEl.textContent = '가로줄을 만드는 중...';
  generateRungs();
  buildRungMeshes();

  await sleep(250);
  await animateRungsReveal();
  await sleep(200);

  const start = Math.floor(Math.random() * N);
  resultEl.innerHTML = `출발: <b>${start + 1}번</b> 🚀`;
  await traverse(start);

  running = false;
  document.getElementById('play').disabled = false;
  document.getElementById('back').disabled = false;
  postEl.style.display = '';
});

document.getElementById('again').addEventListener('click', () => {
  document.getElementById('play').click();
});

document.getElementById('reset').addEventListener('click', goToStep1);

// ---------- Loop ----------
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  if (!running) ladderGroup.rotation.y += 0.0022;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>

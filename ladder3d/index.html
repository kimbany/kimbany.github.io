<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D 입체 사다리 게임</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
    font-family: -apple-system, "Segoe UI", "Noto Sans KR", sans-serif; }
  #canvas-wrap { position:fixed; inset:0; background: linear-gradient(180deg, #8ad6ff 0%, #c4ebff 60%, #ffe7f3 100%); }
  #ui {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    background: rgba(255,255,255,0.92); padding: 14px 16px; border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    max-width: 280px;
  }
  #ui h2 { margin: 0 0 10px 0; font-size: 18px; color: #ff3b8b; }
  .row { display:flex; align-items:center; gap:8px; margin: 6px 0; font-size: 14px; }
  .row input[type=number] { width: 60px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px; }
  button {
    padding: 8px 14px; margin: 4px 4px 0 0; border: none; border-radius: 10px;
    background: #ff3b8b; color: #fff; font-weight: 700; cursor: pointer; font-size: 14px;
    box-shadow: 0 3px 0 #c22c6d;
    transition: transform .08s;
  }
  button:hover { background: #ff589c; }
  button:active { transform: translateY(2px); box-shadow: 0 1px 0 #c22c6d; }
  button.secondary { background:#4da7ff; box-shadow: 0 3px 0 #2f7ecf; }
  button.secondary:hover { background:#6bb6ff; }
  #result { margin-top: 10px; font-weight: 700; color: #333; min-height: 20px; }
  #hint { margin-top: 8px; font-size: 12px; color: #666; }
  #legend { position: absolute; bottom: 12px; right: 12px; z-index: 10;
    background: rgba(255,255,255,0.85); padding: 8px 12px; border-radius: 10px; font-size: 12px; color:#555; }
</style>
</head>
<body>
<div id="canvas-wrap"></div>
<div id="ui">
  <h2>🎡 3D 입체 사다리</h2>
  <div class="row">플레이어 수
    <input type="number" id="playerCount" value="5" min="2" max="8">
  </div>
  <div class="row">가로줄 수
    <input type="number" id="rungCount" value="14" min="3" max="40">
  </div>
  <div>
    <button id="shuffle" class="secondary">🔀 새 사다리</button>
    <button id="play">▶ 출발!</button>
  </div>
  <div id="result"></div>
  <div id="hint">드래그하면 회전, 휠로 확대/축소</div>
</div>
<div id="legend">기둥 <b>1</b> 과 마지막 기둥이 원통처럼 이어져 있어요</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- State ----------
let N = 5;
let RUNGS = 14;
const R = 3;        // cylinder radius
const H = 8;        // cylinder height

const COLORS = [0x58c24d, 0xf9d84a, 0xff6b88, 0x8a67ff, 0x2db6ff, 0xff9a4d, 0x3ad1c6, 0xff69b4];
const FACES  = ['🐣','🥑','🐷','🐰','🐵','🦊','🐻','🐼'];

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xc4ebff, 18, 40);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 2.5, 11);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0, 0);
controls.minDistance = 6;
controls.maxDistance = 20;

// ---------- Lights ----------
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const key = new THREE.DirectionalLight(0xffffff, 0.9);
key.position.set(6, 12, 6);
scene.add(key);
const rim = new THREE.DirectionalLight(0xffd0e8, 0.35);
rim.position.set(-6, 4, -6);
scene.add(rim);

// ---------- Ground disc ----------
{
  const geo = new THREE.CircleGeometry(8, 64);
  const mat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI / 2;
  m.position.y = -H/2 - 0.2;
  scene.add(m);
}

const ladderGroup = new THREE.Group();
scene.add(ladderGroup);

let rungs = []; // { col, y } - connects col <-> (col+1)%N at height y

// ---------- Helpers ----------
function angleOf(i) { return (i / N) * Math.PI * 2; }
function columnPos(i, y) {
  const a = angleOf(i);
  return new THREE.Vector3(R * Math.cos(a), y, R * Math.sin(a));
}

function makeLabelSprite(text, color = '#ffffff', bg = null, size = 1.2) {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  if (bg) {
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(128, 128, 115, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.font = 'bold 170px -apple-system, "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 10;
  ctx.strokeStyle = '#ffffff';
  ctx.strokeText(text, 128, 138);
  ctx.fillStyle = color;
  ctx.fillText(text, 128, 138);
  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = 4;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(size, size, size);
  sp.renderOrder = 5;
  return sp;
}

function cssColor(n) {
  return '#' + n.toString(16).padStart(6, '0');
}

// ---------- Build ladder ----------
function clearGroup(g) { while (g.children.length) g.remove(g.children[0]); }

function buildLadder() {
  clearGroup(ladderGroup);

  // Vertical columns
  const poleMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.05 });
  for (let i = 0; i < N; i++) {
    const geo = new THREE.CylinderGeometry(0.06, 0.06, H, 12);
    const pole = new THREE.Mesh(geo, poleMat);
    pole.position.copy(columnPos(i, 0));
    ladderGroup.add(pole);

    // Top colored ball with number
    const col = COLORS[i % COLORS.length];
    const ballGeo = new THREE.SphereGeometry(0.42, 32, 32);
    const ballMat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.3 });
    const ball = new THREE.Mesh(ballGeo, ballMat);
    const topPos = columnPos(i, H/2 + 0.05);
    ball.position.copy(topPos);
    ladderGroup.add(ball);

    const numSprite = makeLabelSprite(String(i + 1), '#ffffff', null, 0.7);
    numSprite.position.copy(topPos);
    ladderGroup.add(numSprite);

    // Bottom character emoji
    const faceSprite = makeLabelSprite(FACES[i % FACES.length], '#000000', '#ffffff', 1.1);
    faceSprite.position.copy(columnPos(i, -H/2 - 0.55));
    ladderGroup.add(faceSprite);
  }

  // Generate rungs with no collision at the same height on the same column side
  rungs = [];
  const used = new Set();
  const minY = -H/2 + 0.8, maxY = H/2 - 0.8;
  let tries = 0;
  while (rungs.length < RUNGS && tries < RUNGS * 60) {
    tries++;
    const c = Math.floor(Math.random() * N);
    const y = minY + Math.random() * (maxY - minY);
    const bucket = Math.round(y * 3); // ~0.33 unit spacing
    const keyL = `${c}:${bucket}`;
    const keyR = `${(c + 1) % N}:${bucket}`;
    if (used.has(keyL) || used.has(keyR)) continue;
    used.add(keyL); used.add(keyR);
    rungs.push({ col: c, y });
  }

  // Draw rungs as curved tubes along the cylinder surface
  const rungMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
  for (const r of rungs) {
    const a1 = angleOf(r.col);
    const a2 = angleOf(r.col + 1); // short arc (not wrapped via shortest): use stepwise
    const pts = [];
    const steps = 24;
    for (let k = 0; k <= steps; k++) {
      const t = k / steps;
      const a = a1 + (a2 - a1) * t; // always positive direction
      pts.push(new THREE.Vector3(R * Math.cos(a), r.y, R * Math.sin(a)));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.06, 10, false);
    const tube = new THREE.Mesh(tubeGeo, rungMat);
    ladderGroup.add(tube);

    // tiny stars near rung ends (deco)
    const starMat = new THREE.MeshStandardMaterial({ color: 0xfff07a, emissive: 0x665500, emissiveIntensity: 0.4 });
    for (const t of [0.0, 1.0]) {
      const p = curve.getPoint(t);
      const s = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 10), starMat);
      s.position.copy(p);
      ladderGroup.add(s);
    }
  }
}

// ---------- Player ----------
const player = new THREE.Group();
const playerBall = new THREE.Mesh(
  new THREE.SphereGeometry(0.28, 32, 32),
  new THREE.MeshStandardMaterial({ color: 0xff1f77, emissive: 0x661033, emissiveIntensity: 0.4, roughness: 0.25 })
);
player.add(playerBall);
const playerGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.45, 24, 24),
  new THREE.MeshBasicMaterial({ color: 0xff8ac2, transparent: true, opacity: 0.35 })
);
player.add(playerGlow);
player.visible = false;
scene.add(player);

// ---------- Traversal ----------
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function animateDown(col, y1, y2, speed = 4) {
  return new Promise(resolve => {
    const start = performance.now();
    const duration = Math.abs(y1 - y2) / speed * 1000;
    function step(now) {
      const t = duration === 0 ? 1 : Math.min(1, (now - start) / duration);
      const y = y1 + (y2 - y1) * t;
      player.position.copy(columnPos(col, y));
      if (t < 1) requestAnimationFrame(step); else resolve();
    }
    requestAnimationFrame(step);
  });
}

function animateArc(colA, colB, y, duration = 350) {
  return new Promise(resolve => {
    const a1 = angleOf(colA);
    let a2 = angleOf(colB);
    let delta = a2 - a1;
    if (delta > Math.PI) delta -= Math.PI * 2;
    if (delta < -Math.PI) delta += Math.PI * 2;
    const start = performance.now();
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const a = a1 + delta * t;
      player.position.set(R * Math.cos(a), y, R * Math.sin(a));
      if (t < 1) requestAnimationFrame(step); else resolve();
    }
    requestAnimationFrame(step);
  });
}

async function traverse(startCol) {
  player.visible = true;
  let col = startCol;
  let y = H / 2;
  player.position.copy(columnPos(col, y));

  // precompute sorted rungs descending by y
  const sorted = [...rungs].sort((a, b) => b.y - a.y);

  // a safety limit
  for (let safety = 0; safety < 200; safety++) {
    // find next rung strictly below y that touches column col
    let next = null;
    for (const r of sorted) {
      if (r.y >= y - 1e-6) continue;
      if (r.col === col || (r.col + 1) % N === col) { next = r; break; }
    }
    const targetY = next ? next.y : -H / 2;
    await animateDown(col, y, targetY);
    y = targetY;
    if (!next) break;

    const newCol = (next.col === col) ? (col + 1) % N : (col - 1 + N) % N;
    await animateArc(col, newCol, y);
    col = newCol;
  }

  document.getElementById('result').innerHTML =
    `🎉 <b>${startCol + 1}번</b> → 도착: <span style="font-size:20px">${FACES[col % FACES.length]}</span>`;
}

// ---------- UI ----------
const resultEl = document.getElementById('result');
document.getElementById('shuffle').addEventListener('click', () => {
  N = Math.max(2, Math.min(8, parseInt(document.getElementById('playerCount').value) || 5));
  RUNGS = Math.max(3, Math.min(40, parseInt(document.getElementById('rungCount').value) || 14));
  document.getElementById('playerCount').value = N;
  document.getElementById('rungCount').value = RUNGS;
  buildLadder();
  player.visible = false;
  resultEl.textContent = '';
});

let running = false;
document.getElementById('play').addEventListener('click', async () => {
  if (running) return;
  running = true;
  resultEl.textContent = '출발 기둥을 뽑는 중...';
  await sleep(250);
  const start = Math.floor(Math.random() * N);
  resultEl.innerHTML = `출발: <b>${start + 1}번</b> 🚀`;
  await traverse(start);
  running = false;
});

// ---------- Loop ----------
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  if (!running) ladderGroup.rotation.y += 0.0025; // gentle auto-rotate when idle
  controls.update();
  renderer.render(scene, camera);
}

buildLadder();
animate();
</script>
</body>
</html>

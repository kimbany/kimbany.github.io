name: Build Android APK

# 폰에서 바로 설치할 수 있는 디버그 APK 를 자동으로 빌드합니다.
# 결과물은 Actions 탭 → 워크플로우 실행 → Artifacts 에서 다운로드.

on:
  push:
    branches: [master]
    paths:
      - 'fitness-tamagotchi/**'
      - 'fitness-tamagotchi-app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:  # 수동 실행 허용 (Actions 탭에서 Run workflow 버튼)

permissions:
  contents: write   # release 생성/삭제 권한

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: fitness-tamagotchi-app/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        working-directory: fitness-tamagotchi-app
        run: npm ci

      - name: Sync web assets to Android project
        working-directory: fitness-tamagotchi-app
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: fitness-tamagotchi-app/android
        run: chmod +x ./gradlew

      - name: Build debug APK (verbose, with retry on transient errors)
        working-directory: fitness-tamagotchi-app/android
        run: |
          set +e
          rc=1
          for i in 1 2 3; do
            ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-build-${i}.log
            rc=${PIPESTATUS[0]}
            if [ $rc -eq 0 ]; then break; fi
            echo "::warning::Gradle build attempt $i failed (exit $rc) — retrying in 30s"
            sleep 30
          done

          # Always write a markdown report to the workflow summary so the
          # failure is impossible to miss, regardless of how the user reads logs.
          if [ $rc -ne 0 ]; then
            LAST_LOG=$(ls -1 gradle-build-*.log 2>/dev/null | tail -1)
            {
              echo "## ❌ Android 빌드 실패"
              echo ""
              echo "log: \`${LAST_LOG:-<none>}\`"
              if [ -n "$LAST_LOG" ] && [ -f "$LAST_LOG" ]; then
                echo "  / $(wc -l < "$LAST_LOG") 줄 / $(wc -c < "$LAST_LOG") bytes"
                echo ""
                echo "### 🔴 Failed tasks"
                echo '```'
                grep -E '^> Task .* FAILED' "$LAST_LOG" || echo "(매치 없음)"
                echo '```'
                echo ""
                echo "### ⚠️ Error keywords"
                echo '```'
                grep -nE 'error:|^e: |^FAILURE|^\* What went wrong|^\* Where|Caused by:|Could not|Cannot find|Unresolved reference|incompatible' "$LAST_LOG" | head -80
                echo '```'
                echo ""
                echo "### 📜 FAILURE: section (raw)"
                echo '```'
                awk '/^FAILURE:/{flag=1} flag' "$LAST_LOG" | head -200
                echo '```'
                echo ""
                echo "### 📜 Last 200 lines"
                echo '```'
                tail -200 "$LAST_LOG"
                echo '```'
              else
                echo "_log 파일이 없습니다 — Artifact 의 gradle-logs 를 확인하세요._"
              fi
            } >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "==============================================="
            echo "  ❌ 빌드 실패 — 자세한 정보는 워크플로우 페이지"
            echo "  상단의 'Summary' 탭에 마크다운으로 게시됨."
            echo "==============================================="
          fi
          exit $rc

      - name: Upload gradle logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs-${{ github.sha }}
          path: fitness-tamagotchi-app/android/gradle-build-*.log
          retention-days: 7

      - name: Upload build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports-${{ github.sha }}
          path: |
            fitness-tamagotchi-app/android/**/build/reports/
            fitness-tamagotchi-app/android/**/build/outputs/logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-tamagotchi-${{ github.sha }}
          path: fitness-tamagotchi-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish APK to "latest-debug" release (always-overwriting)
        if: success() && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          APK=fitness-tamagotchi-app/android/app/build/outputs/apk/debug/app-debug.apk
          TAG=latest-debug
          # Build the release notes in a temp file (avoids YAML/shell quoting hell).
          NOTES_FILE=$(mktemp)
          {
            echo "Auto-built from $COMMIT_SHA on $(date -u +'%Y-%m-%d %H:%M UTC')."
            echo ""
            echo "폰에서 아래 직링크 그대로 클릭하면 APK 가 받아집니다:"
            echo ""
            echo "https://github.com/$REPO/releases/download/$TAG/app-debug.apk"
            echo ""
            echo "설치 후 '알 수 없는 출처' 권한 허용 필요."
          } > "$NOTES_FILE"
          # Delete any pre-existing release + tag with the same name so we
          # always end up with a single "always-latest" download URL.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" "$APK" \
            --title "Fitness Tamagotchi (debug) — latest" \
            --notes-file "$NOTES_FILE"

      - name: Build summary
        if: success()
        run: |
          {
            echo "## ✅ APK 빌드 완료"
            echo ""
            echo "### 📥 폰에서 바로 받기 (로그인 불필요)"
            echo ""
            echo "폰 브라우저로 아래 URL 접속 → 자동 다운로드:"
            echo ""
            echo '```'
            echo "https://github.com/${{ github.repository }}/releases/download/latest-debug/app-debug.apk"
            echo '```'
            echo ""
            echo "또는 [Releases 페이지](https://github.com/${{ github.repository }}/releases/tag/latest-debug) 에서 다운로드."
            echo ""
            echo "### 💻 PC 에서 받기 (artifact)"
            echo ""
            echo "이 페이지 하단 **Artifacts** 섹션에서 \`fitness-tamagotchi-${{ github.sha }}.zip\` 을 다운로드."
          } >> $GITHUB_STEP_SUMMARY
